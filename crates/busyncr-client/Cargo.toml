[package]
name = "busyncr-client"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "busyncr-client"
path = "src/main.rs"

[dependencies]
anyhow = "1"
busyncr-core.workspace = true
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
# serde_json is not named in the AGENTS.md ask-free palette, but PRD §3.7
# mandates `--json` machine-readable output; it is the serde-family JSON
# serializer (serde itself is in the palette).
serde_json = "1"

[dev-dependencies]
rand = "0.10.2"
tempfile = "3"
