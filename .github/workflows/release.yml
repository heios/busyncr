name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create the release (draft)
    runs-on: ubuntu-latest
    steps:
      - name: Create the draft release if it does not exist
        # Runs once before the build matrix so every leg has a release to
        # upload straight into. Idempotent: a re-run reuses the existing
        # release rather than erroring.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — reusing it."
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "BusyNCR ${{ github.ref_name }}" \
              --generate-notes --draft
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    # Best-effort legs (matrix.optional) may fail without blocking the release.
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
            # Static CRT: no VC++ Redistributable required on target machines.
            rustflags: "-C target-feature=+crt-static"
          - os: windows-latest
            label: windows-aarch64
            target: aarch64-pc-windows-msvc
            ext: .exe
            archive: zip
            rustflags: "-C target-feature=+crt-static"
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-musl
            ext: ""
            archive: tar.gz
            rustflags: ""
          - os: ubuntu-latest
            label: linux-aarch64
            target: aarch64-unknown-linux-musl
            ext: ""
            archive: tar.gz
            rustflags: ""
            use_cross: true
          - os: ubuntu-latest
            label: linux-riscv64
            # gnu, not musl: our TLS stack pulls in aws-lc-sys (via
            # rustls/aws-lc-rs), whose universal pre-generated bindings cover
            # riscv64gc-unknown-linux-*gnu* but NOT -musl (aws-lc-rs#874), so a
            # musl build falls back to a full cmake compile. `cross` also ships
            # a riscv64-gnu image (with a C toolchain) but no musl one, so a
            # musl target silently degrades to host cargo with no cross-gcc.
            # The gnu leg is therefore glibc-dynamic rather than static like the
            # x86_64/aarch64 musl legs; acceptable for this best-effort target.
            target: riscv64gc-unknown-linux-gnu
            ext: ""
            archive: tar.gz
            rustflags: ""
            use_cross: true
            # Best-effort: published when it builds, never blocks a release.
            optional: true
          - os: macos-latest
            label: macos-aarch64
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
            rustflags: ""
            deployment_target: "11.0"
          - os: macos-13
            label: macos-x86_64
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
            rustflags: ""
            deployment_target: "10.13"
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl toolchain (native)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release binaries (cross)
        if: matrix.use_cross == true
        run: cross build --release --workspace --target ${{ matrix.target }}
      - name: Build release binaries
        if: matrix.use_cross != true
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Verify static linking (Linux, any arch)
        if: contains(matrix.target, 'linux-musl')
        run: |
          for bin in busyncr-client busyncr-daemon; do
            p="target/${{ matrix.target }}/release/$bin"
            file "$p"
            file "$p" | grep -Eq "statically linked|static-pie linked" || { echo "::error::$bin not reported static by file(1)"; exit 1; }
            if readelf -l "$p" | grep -q "INTERP"; then
              echo "::error::$bin has a dynamic interpreter (not static)"; exit 1
            fi
          done
      - name: Verify system-libs-only linking (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          for bin in busyncr-client busyncr-daemon; do
            otool -L "target/${{ matrix.target }}/release/$bin"
            if otool -L "target/${{ matrix.target }}/release/$bin" | tail -n +2 | grep -v "/usr/lib/\|/System/Library/"; then
              echo "::error::$bin links non-system dylibs"; exit 1
            fi
          done
      - name: Set up MSVC tools for CRT verification (Windows)
        # rustc locates link.exe on its own, but the CRT check below shells out
        # to `dumpbin`, which is not on PATH by default on the runner. This adds
        # the MSVC developer tools (dumpbin included). x64 dumpbin can inspect
        # the aarch64 binaries too, so the default host arch is fine for both
        # Windows legs. Runs after the build, so it cannot alter build output.
        if: startsWith(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
      - name: Verify static CRT (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          foreach ($bin in "busyncr-client","busyncr-daemon") {
            $imports = (dumpbin /DEPENDENTS "target/${{ matrix.target }}/release/$bin.exe" | Out-String)
            Write-Host $imports
            if ($imports -match "VCRUNTIME|MSVCP|api-ms-win-crt") {
              Write-Error "$bin depends on the MSVC runtime (CRT not static)"; exit 1
            }
          }

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path pkg | Out-Null
          Copy-Item target/${{ matrix.target }}/release/busyncr-client${{ matrix.ext }} pkg/
          Copy-Item target/${{ matrix.target }}/release/busyncr-daemon${{ matrix.ext }} pkg/
          Copy-Item README.md, PRD.md pkg/
          Compress-Archive -Path pkg/* -DestinationPath busyncr-${{ github.ref_name }}-${{ matrix.label }}.zip
      - name: Package (tar.gz, unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p pkg
          cp target/${{ matrix.target }}/release/busyncr-client target/${{ matrix.target }}/release/busyncr-daemon README.md PRD.md pkg/
          tar -C pkg -czf busyncr-${{ github.ref_name }}-${{ matrix.label }}.tar.gz .
      - name: Upload the archive to the release
        # Attach the single packaged archive straight to the release instead of
        # round-tripping through upload/download-artifact — that path re-zips our
        # archive inside the artifact wrapper (the confusing zip-in-zip you get
        # when downloading a workflow artifact, and a needless second compression
        # of already-compressed bytes). bash on every OS so the glob expands the
        # same way; --clobber keeps re-runs idempotent.
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            busyncr-${{ github.ref_name }}-${{ matrix.label }}.* \
            --repo "${{ github.repository }}" --clobber

  publish:
    name: Publish the release (un-draft)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Flip the release from draft to published
        # Runs only after every required leg has uploaded its asset, so the
        # release never appears publicly with a partial set of archives.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --draft=false
